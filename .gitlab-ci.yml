# .gitlab-ci.yml - Automated SSL Certificate Renewal System

variables:
  PYTHON_IMAGE: "python:3.10-slim-buster"
  TARGET_SSH_HOSTS: "$TARGET_SSH_HOSTS_GITLAB"

stages:
  - lint
  - test
  - security
  - dry-run
  - build
  - renew

# --- Stage: Lint ---
lint_python:
  stage: lint
  image: $PYTHON_IMAGE
  script:
    - pip install flake8
    - flake8 cert_automation/ --count --select=E9,F63,F7,F82 --show-source --statistics
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Test ---
unit_tests:
  stage: test
  image: $PYTHON_IMAGE
  script:
    - pip install -r cert_automation/requirements.txt
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/cert_automation
    - pytest tests/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Security ---
sca_scan:
  stage: security
  image: $PYTHON_IMAGE
  script:
    - pip install pip-audit
    - pip-audit -r cert_automation/requirements.txt
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

sast_bandit:
  stage: security
  image: $PYTHON_IMAGE
  script:
    - pip install bandit
    - bandit -r cert_automation/ -ll
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Dry-Run Validation ---
dry_run_validation:
  stage: dry-run
  image: $PYTHON_IMAGE
  before_script:
    - pip install -r cert_automation/requirements.txt
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/cert_automation
    # Inject real config files if CI file-variables are set, else fall back to
    # committed defaults (which is fine — dry-run makes no real API calls).
    - mkdir -p cert_automation/config
    - |
      if [ -n "$CI_DOMAINS_YAML" ]; then
        cp $CI_DOMAINS_YAML cert_automation/config/domains.yaml
      fi
    - |
      if [ -n "$CI_SERVERS_YAML" ]; then
        cp $CI_SERVERS_YAML cert_automation/config/servers.yaml
      fi
  script:
    # Placeholder values satisfy the early env-var check; --dry-run
    # never calls the real ACME or IONOS APIs.
    - export ACME_EMAIL="${ACME_EMAIL:-ci-dryrun@example.com}"
    - export IONOS_API_KEY="${IONOS_API_KEY:-dryrun-placeholder}"
    - export IONOS_API_SECRET="${IONOS_API_SECRET:-dryrun-placeholder}"
    - export CERT_BASE_PATH="$(pwd)/.certs"
    - export ACME_HOME_DIR="$(pwd)/.acme_home"
    - export REPORT_FILE_PATH="$(pwd)/cert_automation/reports/dry_run_report.md"
    - cd cert_automation
    - mkdir -p reports
    - echo "--- Running cert_automation in DRY-RUN mode ---"
    - python3 main.py --dry-run
    - echo "--- Dry-run complete. Report:"
    - cat reports/dry_run_report.md
  artifacts:
    name: "dry-run-report-$CI_COMMIT_SHORT_SHA"
    paths:
      - cert_automation/reports/dry_run_report.md
    expire_in: 1 day
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Build ---
build:
  stage: build
  image: docker:28.1.1
  services:
    - docker:dind
  only:
    - master
    - main
    - /^release-CRL-.*/
    - development
  before_script:
    - export DOCKER_IMAGE="${CI_REGISTRY_IMAGE:-$DOCKER_REGISTRY/lindera/auto_ssl_cert_genration}"
  script:
    - docker login -u $DOCKER_REGISTRY_USER -p $DOCKER_REGISTRY_PASSWORD $DOCKER_REGISTRY
    - docker pull "$DOCKER_IMAGE:$CI_COMMIT_REF_SLUG" || true
    - >
      docker build
      --cache-from "$DOCKER_IMAGE:$CI_COMMIT_REF_SLUG"
      --build-arg DEPLOYMENT_BRANCH="$CI_COMMIT_BRANCH"
      --tag "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA"
      --tag "$DOCKER_IMAGE:$CI_COMMIT_REF_SLUG"
      --tag "$DOCKER_IMAGE:latest"
      .
    - docker push "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$DOCKER_IMAGE:$CI_COMMIT_REF_SLUG"
    - docker push "$DOCKER_IMAGE:latest"

# --- Stage: Renew (Weekly Schedule Pulse) ---
scheduled_renewal:
  stage: renew
  image: docker:28.1.1
  services:
    - docker:dind
  before_script:
    - docker login -u $DOCKER_REGISTRY_USER -p $DOCKER_REGISTRY_PASSWORD $DOCKER_REGISTRY
    - export DOCKER_IMAGE="${CI_REGISTRY_IMAGE:-$DOCKER_REGISTRY/lindera/auto_ssl_cert_genration}"
    - docker pull "$DOCKER_IMAGE:latest"
    # Prepare local mounts for the container run
    - mkdir -p $(pwd)/config
    - cp $CI_DOMAINS_YAML $(pwd)/config/domains.yaml
    - cp $CI_SERVERS_YAML $(pwd)/config/servers.yaml
    - mkdir -p /root/.ssh
    - cp $SSH_PRIVATE_KEY_GITLAB /root/.ssh/automation_key
    - chmod 600 /root/.ssh/automation_key
  script:
    - echo "Starting weekly SSL check (Threshold: $RENEWAL_THRESHOLD_DAYS days)..."
    - "docker run --rm -v $(pwd)/config:/app/config -v /root/.ssh:/root/.ssh -v $(pwd)/reports:/app/reports -v $(pwd)/logs:/app/logs -e IONOS_API_KEY=\"$IONOS_API_KEY_GITLAB\" -e IONOS_API_SECRET=\"$IONOS_API_SECRET_GITLAB\" -e ACME_EMAIL=\"$ACME_EMAIL_GITLAB\" -e ACME_SH_COMMAND=\"/home/certuser/.acme.sh/acme.sh\" -e SSH_KEY_PATH=\"/root/.ssh/automation_key\" -e SSH_USER=\"$SSH_USER\" \"$DOCKER_IMAGE:latest\" python3 main.py"
  artifacts:
    paths:
      - reports/*.md
      - logs/*.log
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
