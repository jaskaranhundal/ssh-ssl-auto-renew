# .gitlab-ci.yml - Automated SSL Certificate Renewal System

variables:
  PYTHON_IMAGE: "python:3.10-slim-buster"
  TARGET_SSH_HOSTS: "$TARGET_SSH_HOSTS_GITLAB"
  # Use your provided registry variables
  DOCKER_IMAGE: "$CI_REGISTRY_IMAGE" 

stages:
  - lint
  - test
  - security
  - build
  - renew

# --- Stage: Lint ---
lint_python:
  stage: lint
  image: $PYTHON_IMAGE
  script:
    - pip install flake8
    - flake8 cert_automation/ --count --select=E9,F63,F7,F82 --show-source --statistics
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Test ---
unit_tests:
  stage: test
  image: $PYTHON_IMAGE
  script:
    - pip install -r cert_automation/requirements.txt
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/cert_automation
    - pytest tests/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Security ---
sca_scan:
  stage: security
  image: $PYTHON_IMAGE
  script:
    - pip install safety
    - safety check -r cert_automation/requirements.txt
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

sast_bandit:
  stage: security
  image: $PYTHON_IMAGE
  script:
    - pip install bandit
    - bandit -r cert_automation/ -ll
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Build (Updated with your custom logic) ---
build:
  stage: build
  image: docker:28.1.1
  services:
    - docker:dind
  only:
    - master
    - main
    - /^release-CRL-.*/
    - development
    - development-crl-2024-07
  script:
    - docker login -u $DOCKER_REGISTRY_USER -p $DOCKER_REGISTRY_PASSWORD $DOCKER_REGISTRY
    - docker pull $DOCKER_IMAGE:$CI_COMMIT_REF_SLUG || true
    - >
      docker build
      --cache-from $DOCKER_IMAGE:$CI_COMMIT_REF_SLUG
      --build-arg DEPLOYMENT_BRANCH=$CI_COMMIT_BRANCH
      --tag $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA
      --tag $DOCKER_IMAGE:$CI_COMMIT_REF_SLUG
      --tag $DOCKER_IMAGE:latest
      .
    - docker push $DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $DOCKER_IMAGE:$CI_COMMIT_REF_SLUG
    - docker push $DOCKER_IMAGE:latest

# --- Stage: Renew (Weekly Schedule Pulse) ---
scheduled_renewal:
  stage: renew
  image: $DOCKER_IMAGE:latest
  before_script:
    - mkdir -p /app/config
    - cp "$CI_DOMAINS_YAML" /app/config/domains.yaml
    - cp "$CI_SERVERS_YAML" /app/config/servers.yaml
    - mkdir -p /root/.ssh && cp "$SSH_PRIVATE_KEY_GITLAB" /root/.ssh/automation_key && chmod 600 /root/.ssh/automation_key
    - eval $(ssh-agent -s) && ssh-add /root/.ssh/automation_key
    - for host in $TARGET_SSH_HOSTS; do ssh-keyscan $host >> ~/.ssh/known_hosts; done
  script:
    - echo "Starting weekly SSL check (Threshold: $RENEWAL_THRESHOLD_DAYS days)..."
    - export IONOS_API_KEY="$IONOS_API_KEY_GITLAB"
    - export IONOS_API_SECRET="$IONOS_API_SECRET_GITLAB"
    - export ACME_EMAIL="$ACME_EMAIL_GITLAB"
    - export ACME_SH_COMMAND="/home/certuser/.acme.sh/acme.sh"
    - cd /app
    - python3 main.py
  artifacts:
    paths:
      - /app/reports/*.md
      - /app/logs/*.log
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      when: manual
