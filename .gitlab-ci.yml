# .gitlab-ci.yml - Automated SSL Certificate Renewal System

variables:
  PYTHON_IMAGE: "python:3.10-slim-buster"
  TARGET_SSH_HOSTS: "$TARGET_SSH_HOSTS_GITLAB"

stages:
  - lint
  - test
  - security
  - build
  - renew

# --- Stage: Lint ---
lint_python:
  stage: lint
  image: $PYTHON_IMAGE
  script:
    - pip install flake8
    - flake8 cert_automation/ --count --select=E9,F63,F7,F82 --show-source --statistics
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Test ---
unit_tests:
  stage: test
  image: $PYTHON_IMAGE
  script:
    - pip install -r cert_automation/requirements.txt
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/cert_automation
    - pytest tests/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Security ---
sca_scan:
  stage: security
  image: $PYTHON_IMAGE
  script:
    - pip install safety
    - safety check -r cert_automation/requirements.txt
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

sast_bandit:
  stage: security
  image: $PYTHON_IMAGE
  script:
    - pip install bandit
    - bandit -r cert_automation/ -ll
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Build (Only when code changes) ---
build_image:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - cert_automation/**/*
        - Dockerfile
        - requirements.txt

# --- Stage: Renew (Weekly Schedule Pulse) ---
scheduled_renewal:
  stage: renew
  image: $CI_REGISTRY_IMAGE:latest
  before_script:
    # Ensure config directory exists in the container
    - mkdir -p /app/config
    # Use the GitLab File variables to create the actual config files
    - cp "$CI_DOMAINS_YAML" /app/config/domains.yaml
    - cp "$CI_SERVERS_YAML" /app/config/servers.yaml
    # Setup SSH Key
    - mkdir -p /root/.ssh && cp "$SSH_PRIVATE_KEY_GITLAB" /root/.ssh/automation_key && chmod 600 /root/.ssh/automation_key
    - eval $(ssh-agent -s) && ssh-add /root/.ssh/automation_key
    - for host in $TARGET_SSH_HOSTS; do ssh-keyscan $host >> ~/.ssh/known_hosts; done
  script:
    - echo "Starting weekly SSL check (Threshold: $RENEWAL_THRESHOLD_DAYS days)..."
    - export IONOS_API_KEY="$IONOS_API_KEY_GITLAB"
    - export IONOS_API_SECRET="$IONOS_API_SECRET_GITLAB"
    - export ACME_EMAIL="$ACME_EMAIL_GITLAB"
    - export ACME_SH_COMMAND="/home/certuser/.acme.sh/acme.sh"
    # Execute the script (it will automatically exit if no cert is < 40 days)
    - cd /app
    - python3 main.py
  artifacts:
    paths:
      - /app/reports/*.md
      - /app/logs/*.log
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual # Allow manual trigger for testing
