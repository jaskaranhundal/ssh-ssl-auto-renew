# .gitlab-ci.yml - Automated SSL Certificate Renewal System

variables:
  PYTHON_IMAGE: "python:3.10-slim-buster"
  DOCKER_REGISTRY: "swr.eu-de.otc.t-systems.com"
  IMAGE_NAME: "lindera/auto_ssl_cert_genration"
  TARGET_SSH_HOSTS: "$TARGET_SSH_HOSTS_GITLAB"
  FULL_IMAGE_PATH: "$DOCKER_REGISTRY/$IMAGE_NAME"

stages:
  - lint
  - test
  - security
  - dry-run
  - build
  - renew

# --- Stage: Lint ---
lint_python:
  stage: lint
  image: $PYTHON_IMAGE
  script:
    - pip install flake8
    - flake8 cert_automation/ --count --select=E9,F63,F7,F82 --show-source --statistics
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Test ---
unit_tests:
  stage: test
  image: $PYTHON_IMAGE
  script:
    - pip install -r cert_automation/requirements-dev.txt
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/cert_automation
    - pytest tests/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Security ---
sca_scan:
  stage: security
  image: $PYTHON_IMAGE
  script:
    - pip install pip-audit
    - pip-audit -r cert_automation/requirements.txt
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

sast_bandit:
  stage: security
  image: $PYTHON_IMAGE
  script:
    - pip install bandit
    - bandit -r cert_automation/ -ll
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Dry-Run Validation ---
dry_run_validation:
  stage: dry-run
  image: $PYTHON_IMAGE
  before_script:
    - pip install -r cert_automation/requirements.txt
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/cert_automation
    - mkdir -p cert_automation/config
    - |
      if [ -n "$CI_DOMAINS_YAML" ]; then
        cp "$CI_DOMAINS_YAML" cert_automation/config/domains.yaml
      fi
    - |
      if [ -n "$CI_SERVERS_YAML" ]; then
        cp "$CI_SERVERS_YAML" cert_automation/config/servers.yaml
      fi
    - mkdir -p "$(pwd)/.ssh"
    - touch "$(pwd)/.ssh/id_rsa"
  script:
    - export ACME_EMAIL="${ACME_EMAIL:-ci-dryrun@example.com}"
    - export IONOS_API_KEY="${IONOS_API_KEY:-dryrun-placeholder}"
    - export IONOS_API_SECRET="${IONOS_API_SECRET:-dryrun-placeholder}"
    - export SSH_KEY_PATH="$(pwd)/.ssh/id_rsa"
    - export CERT_BASE_PATH="$(pwd)/.certs"
    - export ACME_HOME_DIR="$(pwd)/.acme_home"
    - export REPORT_FILE_PATH="$(pwd)/cert_automation/reports/dry_run_report.md"
    - cd cert_automation
    - mkdir -p reports
    - python3 main.py --dry-run
  artifacts:
    name: "dry-run-report-$CI_COMMIT_SHORT_SHA"
    paths:
      - cert_automation/reports/dry_run_report.md
    expire_in: 1 day
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Build ---
build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  only:
    - master
    - main
    - /^release-CRL-.*/
    - development
  script:
    - docker login -u $DOCKER_REGISTRY_USER -p $DOCKER_REGISTRY_PASSWORD $DOCKER_REGISTRY
    - docker pull "$FULL_IMAGE_PATH:latest" || true
    - >
      docker build
      --no-cache
      --build-arg DEPLOYMENT_BRANCH="$CI_COMMIT_BRANCH"
      --tag "$FULL_IMAGE_PATH:$CI_COMMIT_SHORT_SHA"
      --tag "$FULL_IMAGE_PATH:latest"
      .
    - docker push "$FULL_IMAGE_PATH:$CI_COMMIT_SHORT_SHA"
    - docker push "$FULL_IMAGE_PATH:latest"

# --- Stage: Renew (Weekly Schedule Pulse) ---
scheduled_renewal:
  stage: renew
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker login -u $DOCKER_REGISTRY_USER -p $DOCKER_REGISTRY_PASSWORD $DOCKER_REGISTRY
    - docker pull "$FULL_IMAGE_PATH:latest"
    # Prepare ephemeral injection context
    - mkdir -p deploy_context/config deploy_context/ssh
    - cp "$CI_DOMAINS_YAML" deploy_context/config/domains.yaml
    - cp "$CI_SERVERS_YAML" deploy_context/config/servers.yaml
    - cp "$SSH_PRIVATE_KEY_GITLAB" deploy_context/ssh/id_rsa
    # Build known_hosts from target hosts so RejectPolicy can verify host keys
    - apk add --no-cache openssh-client
    - ssh-keyscan -H $TARGET_SSH_HOSTS_GITLAB > deploy_context/ssh/known_hosts 2>/dev/null
    # Bake context into local image to bypass ALL volume mapping/permission issues
    - |
      cat <<EOF > Dockerfile.renew
      FROM $FULL_IMAGE_PATH:latest
      USER root
      COPY deploy_context/config/ /app/config/
      COPY deploy_context/ssh/id_rsa /home/certuser/.ssh/id_rsa
      COPY deploy_context/ssh/known_hosts /home/certuser/.ssh/known_hosts
      RUN chown -R certuser:certuser /app/config /home/certuser/.ssh && chmod 600 /home/certuser/.ssh/id_rsa && chmod 644 /home/certuser/.ssh/known_hosts
      USER certuser
      EOF
    - docker build -t renewal-app:local -f Dockerfile.renew .
  script:
    - echo "Starting weekly SSL renewal check via baked context image..."
    - |
      docker run --rm \
      -e IONOS_API_KEY="$IONOS_API_KEY_GITLAB" \
      -e IONOS_API_SECRET="$IONOS_API_SECRET_GITLAB" \
      -e ACME_EMAIL="$ACME_EMAIL_GITLAB" \
      -e ACME_SH_COMMAND="/home/certuser/.acme.sh/acme.sh" \
      -e ACME_HOME_DIR="/home/certuser/.acme.sh" \
      -e SSH_KEY_PATH="/home/certuser/.ssh/id_rsa" \
      -e CERT_BASE_PATH="/app/certs" \
      -e LOG_FILE_PATH="/app/logs/renewal.log" \
      -e REPORT_FILE_PATH="/app/reports/renewal_report.md" \
      -e OS_AUTH_URL="$OS_AUTH_URL" \
      -e OS_USERNAME="$OS_USERNAME" \
      -e OS_PASSWORD="$OS_PASSWORD" \
      -e OS_USER_DOMAIN_NAME="$OS_USER_DOMAIN_NAME" \
      -e OS_PROJECT_ID="$OS_PROJECT_ID" \
      renewal-app:local
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
