# .gitlab-ci.yml - Automated SSL Certificate Renewal System

variables:
  PYTHON_IMAGE: "python:3.10-slim-buster"
  TARGET_SSH_HOSTS: "$TARGET_SSH_HOSTS_GITLAB"
  IMAGE_NAME: "lindera/auto_ssl_cert_genration"

stages:
  - lint
  - test
  - security
  - dry-run
  - build
  - renew

# --- Stage: Lint ---
lint_python:
  stage: lint
  image: $PYTHON_IMAGE
  script:
    - pip install flake8
    - flake8 cert_automation/ --count --select=E9,F63,F7,F82 --show-source --statistics
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Test ---
unit_tests:
  stage: test
  image: $PYTHON_IMAGE
  script:
    - pip install -r cert_automation/requirements.txt
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/cert_automation
    - pytest tests/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Security ---
sca_scan:
  stage: security
  image: $PYTHON_IMAGE
  script:
    - pip install pip-audit
    - pip-audit -r cert_automation/requirements.txt
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

sast_bandit:
  stage: security
  image: $PYTHON_IMAGE
  script:
    - pip install bandit
    - bandit -r cert_automation/ -ll
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Dry-Run Validation ---
dry_run_validation:
  stage: dry-run
  image: $PYTHON_IMAGE
  before_script:
    - pip install -r cert_automation/requirements.txt
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/cert_automation
    - mkdir -p cert_automation/config
    - |
      if [ -n "$CI_DOMAINS_YAML" ]; then
        cp "$CI_DOMAINS_YAML" cert_automation/config/domains.yaml
      fi
    - |
      if [ -n "$CI_SERVERS_YAML" ]; then
        cp "$CI_SERVERS_YAML" cert_automation/config/servers.yaml
      fi
    - mkdir -p "$(pwd)/.ssh"
    - touch "$(pwd)/.ssh/id_rsa"
  script:
    - export ACME_EMAIL="${ACME_EMAIL:-ci-dryrun@example.com}"
    - export IONOS_API_KEY="${IONOS_API_KEY:-dryrun-placeholder}"
    - export IONOS_API_SECRET="${IONOS_API_SECRET:-dryrun-placeholder}"
    - export SSH_KEY_PATH="$(pwd)/.ssh/id_rsa"
    - export CERT_BASE_PATH="$(pwd)/.certs"
    - export ACME_HOME_DIR="$(pwd)/.acme_home"
    - export REPORT_FILE_PATH="$(pwd)/cert_automation/reports/dry_run_report.md"
    - cd cert_automation
    - mkdir -p reports
    - python3 main.py --dry-run
  artifacts:
    name: "dry-run-report-$CI_COMMIT_SHORT_SHA"
    paths:
      - cert_automation/reports/dry_run_report.md
    expire_in: 1 day
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Build ---
build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  only:
    - master
    - main
    - /^release-CRL-.*/
    - development
  before_script:
    - export DOCKER_IMAGE="${CI_REGISTRY_IMAGE:-$DOCKER_REGISTRY/$IMAGE_NAME}"
  script:
    - docker login -u $DOCKER_REGISTRY_USER -p $DOCKER_REGISTRY_PASSWORD $DOCKER_REGISTRY
    - docker pull "$DOCKER_IMAGE:$CI_COMMIT_REF_SLUG" || true
    - >
      docker build
      --cache-from "$DOCKER_IMAGE:$CI_COMMIT_REF_SLUG"
      --build-arg DEPLOYMENT_BRANCH="$CI_COMMIT_BRANCH"
      --tag "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA"
      --tag "$DOCKER_IMAGE:$CI_COMMIT_REF_SLUG"
      --tag "$DOCKER_IMAGE:latest"
      .
    - docker push "$DOCKER_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$DOCKER_IMAGE:$CI_COMMIT_REF_SLUG"
    - docker push "$DOCKER_IMAGE:latest"

# --- Stage: Renew (Weekly Schedule Pulse) ---
scheduled_renewal:
  stage: renew
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker login -u $DOCKER_REGISTRY_USER -p $DOCKER_REGISTRY_PASSWORD $DOCKER_REGISTRY
    - export DOCKER_IMAGE="${CI_REGISTRY_IMAGE:-$DOCKER_REGISTRY/$IMAGE_NAME}"
    - docker pull "$DOCKER_IMAGE:latest"
    # Create local directories and ensure they are world-writable so the container user (1000) can write to them
    - mkdir -p $(pwd)/config $(pwd)/reports $(pwd)/logs $(pwd)/.ssh
    - chmod -R 777 $(pwd)/reports $(pwd)/logs
    - cp $CI_DOMAINS_YAML $(pwd)/config/domains.yaml
    - cp $CI_SERVERS_YAML $(pwd)/config/servers.yaml
    - cp $SSH_PRIVATE_KEY_GITLAB $(pwd)/.ssh/id_rsa
    - chmod 600 $(pwd)/.ssh/id_rsa
  script:
    - "echo Starting weekly SSL check (Threshold: $RENEWAL_THRESHOLD_DAYS days)..."
    - |
      docker run --rm \
      -v $(pwd)/config:/app/config \
      -v $(pwd)/reports:/app/reports \
      -v $(pwd)/logs:/app/logs \
      -v $(pwd)/.ssh:/home/certuser/.ssh \
      -e IONOS_API_KEY="$IONOS_API_KEY_GITLAB" \
      -e IONOS_API_SECRET="$IONOS_API_SECRET_GITLAB" \
      -e ACME_EMAIL="$ACME_EMAIL_GITLAB" \
      -e ACME_SH_COMMAND="/home/certuser/.acme.sh/acme.sh" \
      -e SSH_KEY_PATH="/home/certuser/.ssh/id_rsa" \
      -e CERT_BASE_PATH="/app/certs" \
      -e LOG_FILE_PATH="/app/logs/renewal.log" \
      -e REPORT_FILE_PATH="/app/reports/renewal_report.md" \
      "$DOCKER_IMAGE:latest"
  artifacts:
    paths:
      - reports/*.md
      - logs/*.log
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
