# .gitlab-ci.yml - Automated SSL Certificate Renewal System

variables:
  # Base image for Python tools
  PYTHON_IMAGE: "python:3.10-slim-buster"
  # Target SSH hosts for known_hosts population
  TARGET_SSH_HOSTS: "$TARGET_SSH_HOSTS_GITLAB"

stages:
  - lint
  - test
  - security
  - build
  - renew

# --- Stage: Lint ---
lint_python:
  stage: lint
  image: $PYTHON_IMAGE
  script:
    - pip install flake8
    - flake8 cert_automation/ --count --select=E9,F63,F7,F82 --show-source --statistics
    - flake8 cert_automation/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Test ---
unit_tests:
  stage: test
  image: $PYTHON_IMAGE
  script:
    - pip install -r cert_automation/requirements.txt
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/cert_automation
    - pytest tests/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Security ---
# Software Composition Analysis (SCA) - Check for vulnerable dependencies
sca_scan:
  stage: security
  image: $PYTHON_IMAGE
  script:
    - pip install safety
    - safety check -r cert_automation/requirements.txt
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# Static Analysis Security Testing (SAST) - Check for security issues in code
sast_bandit:
  stage: security
  image: $PYTHON_IMAGE
  script:
    - pip install bandit
    - bandit -r cert_automation/ -ll
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# --- Stage: Build ---
build_image:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "development" || $CI_COMMIT_BRANCH == "test"'

# --- Stage: Renew (Dry Run on Branch Updates) ---
branch_dry_run:
  stage: renew
  image: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  before_script:
    - mkdir -p cert_automation/config
    - echo "$CI_DOMAINS_YAML" > cert_automation/config/domains.yaml
    - echo "$CI_SERVERS_YAML" > cert_automation/config/servers.yaml
    - mkdir -p /root/.ssh && echo "$SSH_PRIVATE_KEY_GITLAB" > /root/.ssh/automation_key && chmod 600 /root/.ssh/automation_key
    - eval $(ssh-agent -s) && ssh-add /root/.ssh/automation_key
    - for host in $TARGET_SSH_HOSTS; do ssh-keyscan $host >> ~/.ssh/known_hosts; done
  script:
    - echo "Validating configuration via DRY RUN for branch $CI_COMMIT_BRANCH..."
    - export IONOS_API_KEY="$IONOS_API_KEY_GITLAB"
    - export IONOS_API_SECRET="$IONOS_API_SECRET_GITLAB"
    - export ACME_EMAIL="$ACME_EMAIL_GITLAB"
    - export ACME_SH_COMMAND="/home/certuser/.acme.sh/acme.sh"
    - cd cert_automation
    - python3 main.py --dry-run --force
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "development" || $CI_COMMIT_BRANCH == "test"'

# --- Stage: Renew (Actual Renewal on Schedule Only) ---
scheduled_renewal:
  stage: renew
  image: $CI_REGISTRY_IMAGE:latest
  before_script:
    - mkdir -p cert_automation/config
    - echo "$CI_DOMAINS_YAML" > cert_automation/config/domains.yaml
    - echo "$CI_SERVERS_YAML" > cert_automation/config/servers.yaml
    - mkdir -p /root/.ssh && echo "$SSH_PRIVATE_KEY_GITLAB" > /root/.ssh/automation_key && chmod 600 /root/.ssh/automation_key
    - eval $(ssh-agent -s) && ssh-add /root/.ssh/automation_key
    - for host in $TARGET_SSH_HOSTS; do ssh-keyscan $host >> ~/.ssh/known_hosts; done
  script:
    - echo "Executing SCHEDULED certificate renewal..."
    - export IONOS_API_KEY="$IONOS_API_KEY_GITLAB"
    - export IONOS_API_SECRET="$IONOS_API_SECRET_GITLAB"
    - export ACME_EMAIL="$ACME_EMAIL_GITLAB"
    - export ACME_SH_COMMAND="/home/certuser/.acme.sh/acme.sh"
    - cd cert_automation
    - python3 main.py --force
  artifacts:
    paths:
      - cert_automation/reports/*.md
      - cert_automation/logs/*.log
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual # Allow manual override on main only
